<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Google OAuth Test</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>

  <body>
    <h2>Google OAuth Testing</h2>

    <!-- Button that triggers the sign‑in flow -->
    <div
      id="g_id_onload"
      data-client_id="870805978904-fvhhkp925mqhj4f2557bgnt3p9je58dt.apps.googleusercontent.com"
      data-callback="handleCredentialResponse"
    ></div>
    <div class="g_id_signin"></div>

    <script>
      async function handleCredentialResponse(response) {
        console.log('Google Token:');
        console.log(response.credential);

        try {
          const res = await fetch('http://localhost:5000/api/v1/auth/google', {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json',
            },

            body: JSON.stringify({
              tokenId: response.credential,
            }),
          });

          const data = await res.json();

          console.log('Backend Response:');
          console.log(data);
        } catch (err) {
          console.error(err);
        }
      }
    </script>
  </body>
</html>
